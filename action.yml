name: 'Veracode Fix for SCA'
description: 'Automatically fixes vulnerabilities detected by Veracode SCA'
inputs:
  github-token:
    description: "Github token to download artifacts and interact with GitHub API"
    required: true
  sca-scan-run-id:
    description: "GitHub Actions run ID containing the SCA scan artifact"
    required: true
  sca-scan-artifact-id:
    description: "Artifact ID of the SCA scan results"
    required: true
  repository:
    description: "Target repository in format owner/repo"
    required: true
  branch:
    description: "Target branch for the fix PR"
    required: true
  github-api-url:
    description: "GitHub API URL (e.g., https://api.github.com)"
    required: true
  pr-number:
    description: "Original PR number to post comments on"
    required: true
  fix-sca-params:
    description: "Additional parameters for Fix SCA command"
    required: false
  fix-transitive:
    description: "Fix transitive dependencies (default: true)"
    required: false
    default: 'true'

# outputs:
#   run-next-step:
#     description: "Whether to continue with PR creation"
#     value: ${{ steps.run-fix-sca.outputs.run-next-step }}
#   create-pr-run-next-step:
#     description: "Whether to continue with PR comment posting"
#     value: ${{ steps.create-pr.outputs.run-next-step }}

runs:
  using: "node20"
  main: "dist/index.js"
